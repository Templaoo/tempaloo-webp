version: 2
updates:
  - package-ecosystem: npm
    directory: "/api"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    labels: ["deps", "api"]
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: npm
    directory: "/web"
    schedule:
      interval: weekly
      day: monday
      time: "06:10"
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    labels: ["deps", "web"]
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: npm
    directory: "/plugin/tempaloo-webp/admin-app"
    schedule:
      interval: weekly
      day: monday
      time: "06:20"
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    labels: ["deps", "plugin"]
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: Europe/Paris
    open-pull-requests-limit: 3
    labels: ["deps", "ci"]

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API (typecheck + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  admin-app:
    name: Plugin admin UI (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugin/tempaloo-webp/admin-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: plugin/tempaloo-webp/admin-app/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  web:
    name: Web (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    env:
      TEMPALOO_API_BASE: http://localhost:3000/v1
      TEMPALOO_INTERNAL_KEY: ci-placeholder-internal-key-0000000000000000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run typecheck
      - run: npx next build

  php:
    name: PHP lint (7.4 + 8.3)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ["7.4", "8.3"]
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: none
      - name: Lint all plugin PHP files
        run: |
          find plugin/tempaloo-webp -type f -name "*.php" -print0 | xargs -0 -n1 php -l

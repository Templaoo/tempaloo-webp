<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#214d47"/>
      <stop offset="60%" stop-color="#2a615a"/>
      <stop offset="100%" stop-color="#1a3a36"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.7" cy="0.3" r="0.6">
      <stop offset="0%"   stop-color="#3fb2a2" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#3fb2a2" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="1000" fill="url(#bg)"/>
  <rect width="800" height="1000" fill="url(#grid)"/>
  <rect width="800" height="1000" fill="url(#halo)"/>
  <g transform="translate(400 500)" fill="none" stroke="rgba(245,244,239,0.8)" stroke-width="1.5">
    <circle cx="0" cy="0" r="120" stroke-opacity="0.6"/>
    <circle cx="0" cy="0" r="180" stroke-opacity="0.35"/>
    <circle cx="0" cy="0" r="240" stroke-opacity="0.18"/>
  </g>
  <g transform="translate(400 500)" fill="rgba(245,244,239,0.9)">
    <text x="0" y="-8" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="36" letter-spacing="-0.02em">Avero</text>
    <text x="0" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" letter-spacing="0.18em" fill="rgba(245,244,239,0.55)">REPLACE WITH YOUR HERO IMAGE</text>
  </g>
</svg>

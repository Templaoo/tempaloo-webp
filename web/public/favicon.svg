<?xml version="1.0" encoding="UTF-8"?>
<!--
    Tempaloo brand mark — transparent background.
    The two paths are the canonical T glyph from the master logo
    (logos/logo-icon.svg). Background rect from the source has been
    stripped so the icon overlays cleanly on any color.

    Auto dark/light: the <style> block flips fill to white when the
    user-agent reports a dark color scheme — works in Chrome, Firefox,
    Safari favicons + tab bars. Browsers that don't support
    prefers-color-scheme inside SVG just keep the dark fill, which
    still reads on light browser chrome (Edge, older WebKit).
-->
<svg version="1.1" viewBox="0 0 2048 2048" xmlns="http://www.w3.org/2000/svg">
    <style>
        path { fill: #0A0A0A; }
        @media (prefers-color-scheme: dark) {
            path { fill: #FFFFFF; }
        }
    </style>

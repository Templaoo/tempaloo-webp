<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1544 500" width="1544" height="500">
  <defs>
    <!-- Subtle background glow to add depth -->
    <radialGradient id="bg-glow" cx="25%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </radialGradient>

    <!-- Dotted grid pattern -->
    <pattern id="grid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#2a2a2a"/>
    </pattern>

    <!-- Pill gradient -->
    <linearGradient id="pill-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FAFAFA"/>
      <stop offset="100%" stop-color="#D4D4D4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1544" height="500" fill="url(#bg-glow)"/>
  <rect width="1544" height="500" fill="url(#grid)" opacity="0.5"/>

  <!-- Fade mask on the right side to focus the composition -->
  <rect width="1544" height="500" fill="url(#bg-glow)" opacity="0.3"/>

  <!-- Left: Logo + wordmark -->
  <g transform="translate(100 170)">
    <!-- Logo mark -->
    <g transform="scale(3.5)">
      <path d="M4 7 L7 4 L20 4 L20 9 L14 9 L14 20 L10 20 L10 9 L4 9 Z" fill="#FAFAFA"/>
    </g>
    <!-- Wordmark -->
    <text x="110" y="60" fill="#FAFAFA"
          font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
          font-size="52" font-weight="600" letter-spacing="-1.5">
      Tempaloo<tspan fill="#666666"> / WebP</tspan>
    </text>
  </g>

  <!-- Hero copy -->
  <text x="100" y="340" fill="#FAFAFA"
        font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="72" font-weight="700" letter-spacing="-3">
    Faster WordPress.
  </text>
  <text x="100" y="425" fill="#8F8F8F"
        font-family="Georgia, 'Times New Roman', serif"
        font-style="italic" font-size="64" font-weight="400" letter-spacing="-2">
    One upload, every size.
  </text>

  <!-- Right side: credit comparison pill + feature chips -->
  <g transform="translate(1000 160)">
    <!-- Pill: 1 upload = 1 credit -->
    <rect x="0" y="0" width="420" height="64" rx="32" fill="url(#pill-grad)"/>
    <text x="30" y="42" fill="#0A0A0A"
          font-family="ui-monospace, 'SF Mono', Menlo, monospace"
          font-size="22" font-weight="600" letter-spacing="-0.5">
      1 upload  =  1 credit
    </text>

    <!-- Feature chips -->
    <g transform="translate(0 100)">
      <rect x="0" y="0" width="180" height="40" rx="20" fill="none" stroke="#3A3A3A" stroke-width="1"/>
      <text x="20" y="27" fill="#FAFAFA"
            font-family="ui-monospace, monospace" font-size="14">WebP + AVIF</text>

      <rect x="200" y="0" width="220" height="40" rx="20" fill="none" stroke="#3A3A3A" stroke-width="1"/>
      <text x="220" y="27" fill="#FAFAFA"
            font-family="ui-monospace, monospace" font-size="14">Every thumbnail bundled</text>
    </g>

    <g transform="translate(0 160)">
      <rect x="0" y="0" width="170" height="40" rx="20" fill="none" stroke="#3A3A3A" stroke-width="1"/>
      <text x="20" y="27" fill="#FAFAFA"
            font-family="ui-monospace, monospace" font-size="14">EU-hosted</text>

      <rect x="190" y="0" width="230" height="40" rx="20" fill="none" stroke="#3A3A3A" stroke-width="1"/>
      <text x="210" y="27" fill="#FAFAFA"
            font-family="ui-monospace, monospace" font-size="14">Free plan — 250 / month</text>
    </g>
  </g>

  <!-- Bottom-right tag -->
  <text x="1444" y="475" fill="#666666" text-anchor="end"
        font-family="ui-monospace, monospace" font-size="13">
    tempaloo.com/webp  ·  WordPress 6.0+  ·  GPL
  </text>
</svg>

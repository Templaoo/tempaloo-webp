<?xml version="1.0" encoding="UTF-8"?>
<!-- Screenshot 3: Media library with WEBP badges -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#F5F5F5"/>

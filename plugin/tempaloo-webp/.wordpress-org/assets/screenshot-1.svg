<?xml version="1.0" encoding="UTF-8"?>
<!-- Screenshot 1: Dashboard (quota ring + savings) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="ss1-ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#444"/>
    </linearGradient>
  </defs>

  <!-- Window chrome -->
  <rect width="1280" height="720" fill="#F5F5F5"/>
  <rect x="0" y="0" width="1280" height="44" fill="#E8E8E8"/>
  <circle cx="24" cy="22" r="6" fill="#FF5F57"/>
  <circle cx="48" cy="22" r="6" fill="#FEBC2E"/>
  <circle cx="72" cy="22" r="6" fill="#28C840"/>
  <rect x="480" y="12" width="320" height="20" rx="10" fill="#FAFAFA"/>
  <text x="640" y="28" text-anchor="middle" fill="#666"
        font-family="ui-monospace, monospace" font-size="12">
    wp-admin / tempaloo-webp
  </text>

  <!-- Plugin header -->
  <g transform="translate(60 90)">
    <g transform="scale(2)">
      <rect width="24" height="24" rx="6" fill="#0A0A0A"/>
      <path d="M4 7 L7 4 L20 4 L20 9 L14 9 L14 20 L10 20 L10 9 L4 9 Z" fill="#FAFAFA" transform="scale(1)"/>
    </g>
    <text x="64" y="22" fill="#0A0A0A"
          font-family="ui-sans-serif, system-ui, sans-serif"
          font-size="20" font-weight="600" letter-spacing="-0.5">
      Tempaloo WebP
    </text>
    <text x="64" y="44" fill="#666"
          font-family="ui-sans-serif, system-ui, sans-serif" font-size="12">
      Image optimizer &amp; AVIF converter
    </text>
  </g>

  <!-- API live chip -->
  <g transform="translate(1040 100)">
    <rect width="110" height="28" rx="14" fill="#E8F7EE" stroke="#BEE6CD" stroke-width="1"/>
    <circle cx="14" cy="14" r="4" fill="#17C964"/>
    <text x="28" y="19" fill="#0E7934"
          font-family="ui-sans-serif, system-ui, sans-serif"
          font-size="12" font-weight="500">
      API live
    </text>
  </g>

  <!-- Plan badge -->
  <g transform="translate(1160 100)">
    <rect width="70" height="28" rx="14" fill="#E0E7FF"/>
    <text x="35" y="19" text-anchor="middle" fill="#4338CA"
          font-family="ui-sans-serif, system-ui, sans-serif"
          font-size="11" font-weight="600">
      FREE
    </text>
  </g>

  <!-- Main card: This month + savings grid -->
  <g transform="translate(60 200)">
    <!-- Quota card -->
    <rect width="380" height="440" rx="12" fill="#FFFFFF" stroke="#E8E8E8"/>
    <text x="24" y="42" fill="#0A0A0A"
          font-family="ui-sans-serif, system-ui, sans-serif"
          font-size="16" font-weight="600">This month</text>

    <!-- Quota ring -->
    <g transform="translate(190 230)">
      <circle r="100" fill="none" stroke="#EAEAEA" stroke-width="12"/>
      <circle r="100" fill="none" stroke="url(#ss1-ring)" stroke-width="12"
              stroke-dasharray="175 628" stroke-dashoffset="0"
              transform="rotate(-90)" stroke-linecap="round"/>
      <text y="6" text-anchor="middle" fill="#0A0A0A"
            font-family="ui-sans-serif, system-ui, sans-serif"
            font-size="44" font-weight="700">87</text>
      <text y="32" text-anchor="middle" fill="#666"
            font-family="ui-monospace, monospace" font-size="13">
        of 250
      </text>
    </g>

    <!-- Used / Left / Resets -->
    <g transform="translate(24 380)">
      <text x="0" y="0" fill="#999"
            font-family="ui-sans-serif, system-ui, sans-serif" font-size="11">USED</text>
      <text x="0" y="22" fill="#0A0A0A"
            font-family="ui-sans-serif, system-ui, sans-serif"
            font-size="18" font-weight="600">87</text>

      <text x="120" y="0" fill="#999"
            font-family="ui-sans-serif, system-ui, sans-serif" font-size="11">LEFT</text>
      <text x="120" y="22" fill="#0A0A0A"
            font-family="ui-sans-serif, system-ui, sans-serif"
            font-size="18" font-weight="600">163</text>

      <text x="240" y="0" fill="#999"
            font-family="ui-sans-serif, system-ui, sans-serif" font-size="11">RESETS</text>
      <text x="240" y="22" fill="#0A0A0A"
            font-family="ui-sans-serif, system-ui, sans-serif"
            font-size="18" font-weight="600">1 May</text>
    </g>
  </g>

  <!-- Savings card -->
  <g transform="translate(460 200)">
    <rect width="760" height="440" rx="12" fill="#FFFFFF" stroke="#E8E8E8"/>
    <text x="24" y="42" fill="#0A0A0A"
          font-family="ui-sans-serif, system-ui, sans-serif"
          font-size="16" font-weight="600">Savings on your site</text>
    <text x="24" y="66" fill="#666"
          font-family="ui-sans-serif, system-ui, sans-serif" font-size="13">
      Total bandwidth saved since conversion started.
    </text>

    <!-- Stat: Images converted -->
    <g transform="translate(24 120)">
      <text fill="#999" font-family="ui-sans-serif, system-ui, sans-serif"
            font-size="11" letter-spacing="0.5">IMAGES CONVERTED</text>
      <text y="48" fill="#0A0A0A"
            font-family="ui-sans-serif, system-ui, sans-serif"
            font-size="48" font-weight="700" letter-spacing="-1.5">
        87
      </text>
      <text y="74" fill="#666"
            font-family="ui-sans-serif, system-ui, sans-serif" font-size="12">
        attachments across all sizes
      </text>
    </g>

    <g transform="translate(300 120)">
      <text fill="#999" font-family="ui-sans-serif, system-ui, sans-serif"
            font-size="11" letter-spacing="0.5">ORIGINAL SIZE</text>
      <text y="48" fill="#0A0A0A"
            font-family="ui-sans-serif, system-ui, sans-serif"
            font-size="48" font-weight="700" letter-spacing="-1.5">
        62.1 MB
      </text>
    </g>

    <g transform="translate(560 120)">
      <text fill="#999" font-family="ui-sans-serif, system-ui, sans-serif"
            font-size="11" letter-spacing="0.5">AFTER WEBP</text>
      <text y="48" fill="#17C964"
            font-family="ui-sans-serif, system-ui, sans-serif"
            font-size="48" font-weight="700" letter-spacing="-1.5">
        7.2 MB
      </text>
      <text y="74" fill="#0E7934"
            font-family="ui-sans-serif, system-ui, sans-serif" font-size="12">
        −88% lighter
      </text>
    </g>

    <!-- Bar graph representation -->
    <g transform="translate(24 290)">
      <text fill="#999" font-family="ui-sans-serif, system-ui, sans-serif"
            font-size="11" letter-spacing="0.5">BREAKDOWN</text>
      <g transform="translate(0 24)">
        <rect x="0" y="0" width="700" height="24" rx="4" fill="#EAEAEA"/>
        <rect x="0" y="0" width="84" height="24" rx="4" fill="#0A0A0A"/>
        <text x="700" y="60" text-anchor="end" fill="#666"
              font-family="ui-monospace, monospace" font-size="11">
          Original &gt; WebP  ·  −88%
        </text>
      </g>
    </g>
  </g>
</svg>

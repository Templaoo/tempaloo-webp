<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 772 250" width="772" height="250">
  <defs>
    <radialGradient id="bg-glow-sm" cx="25%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </radialGradient>
    <pattern id="grid-sm" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.8" fill="#2a2a2a"/>
    </pattern>
  </defs>

  <rect width="772" height="250" fill="url(#bg-glow-sm)"/>
  <rect width="772" height="250" fill="url(#grid-sm)" opacity="0.5"/>

  <!-- Logo -->
  <g transform="translate(50 85)">
    <g transform="scale(2.2)">
      <path d="M4 7 L7 4 L20 4 L20 9 L14 9 L14 20 L10 20 L10 9 L4 9 Z" fill="#FAFAFA"/>
    </g>
    <text x="68" y="38" fill="#FAFAFA"
          font-family="ui-sans-serif, system-ui, -apple-system, sans-serif"
          font-size="30" font-weight="600" letter-spacing="-0.9">
      Tempaloo<tspan fill="#666666"> / WebP</tspan>
    </text>
  </g>

  <!-- Headline -->
  <text x="50" y="180" fill="#FAFAFA"
        font-family="ui-sans-serif, system-ui, -apple-system, sans-serif"
        font-size="38" font-weight="700" letter-spacing="-1.5">
    Faster WordPress.
  </text>
  <text x="50" y="222" fill="#8F8F8F"
        font-family="Georgia, 'Times New Roman', serif"
        font-style="italic" font-size="32" font-weight="400" letter-spacing="-1">
    One upload, every size.
  </text>

  <!-- Right-side pill -->
  <g transform="translate(500 95)">
    <rect x="0" y="0" width="240" height="44" rx="22" fill="#FAFAFA"/>
    <text x="18" y="29" fill="#0A0A0A"
          font-family="ui-monospace, monospace"
          font-size="16" font-weight="600" letter-spacing="-0.3">
      1 upload  =  1 credit
    </text>
  </g>

  <text x="722" y="230" fill="#666666" text-anchor="end"
        font-family="ui-monospace, monospace" font-size="11">
    WordPress 6.0+  ·  GPL
  </text>
</svg>
